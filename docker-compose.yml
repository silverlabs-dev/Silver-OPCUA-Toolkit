# docker-compose.yml

services:

  simulator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uv run python simulator/server.py
    networks:
      - opcua-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost',4840)); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uv run python run.py
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - LOG_FORMAT=json
      - LOG_LEVEL=INFO
      - DB_PATH=/app/data/toolkit.db
    volumes:
      - ./data:/app/data
    depends_on:
      simulator:
        condition: service_healthy
    networks:
      - opcua-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - opcua-net
    restart: unless-stopped

networks:
  opcua-net:
    driver: bridge