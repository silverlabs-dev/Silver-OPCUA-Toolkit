# docker-compose.yml

services:

  simulator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uv run python simulator/server.py
    networks:
      - opcua-net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uv run python run.py
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - LOG_FORMAT=json
      - LOG_LEVEL=INFO
      - DB_PATH=/app/data/toolkit.db
    volumes:
      - ./data:/app/data
    depends_on:
      - simulator
    networks:
      - opcua-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - opcua-net
    restart: unless-stopped

networks:
  opcua-net:
    driver: bridge